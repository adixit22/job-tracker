<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Search Tracker — Ashutosh Dixit</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:15px;color:#1a1a1a;background:#fff;padding:0 0 2rem}
h2{font-size:18px;font-weight:500;margin-bottom:1rem}
.nav{display:flex;gap:4px;padding:1rem 1rem 0;border-bottom:1px solid #e5e5e5;margin-bottom:1.5rem;overflow-x:auto}
.nav-btn{padding:8px 14px;border:none;background:none;cursor:pointer;font-size:14px;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.nav-btn.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.view{display:none;padding:0 1rem}
.view.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1.5rem}
.metric{background:#f5f5f5;border-radius:8px;padding:.75rem 1rem}
.metric-label{font-size:12px;color:#666;margin-bottom:4px}
.metric-val{font-size:22px;font-weight:500}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid #ccc;border-radius:8px;background:transparent;cursor:pointer;font-size:13px;color:#1a1a1a;font-family:inherit}
.btn:hover{background:#f5f5f5}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{opacity:.85}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{color:#a32d2d;border-color:#a32d2d}
.btn-danger:hover{background:#fcebeb}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-wishlist{background:#eeedfe;color:#3c3489}
.badge-applied{background:#e6f1fb;color:#0c447c}
.badge-phone{background:#faeeda;color:#633806}
.badge-interview{background:#e1f5ee;color:#085041}
.badge-offer{background:#eaf3de;color:#27500a}
.badge-rejected{background:#fcebeb;color:#791f1f}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;background:#f5f5f5;color:#666;border:1px solid #e5e5e5}
.overdue-high{background:#fff5f5;border-left:3px solid #e24b4a}
.overdue-med{background:#fffbf0;border-left:3px solid #ef9f27}
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:1rem}
.kanban-col{min-width:180px;flex:1}
.kanban-col-header{font-size:12px;font-weight:500;color:#666;padding:6px 0;margin-bottom:8px;border-bottom:1px solid #e5e5e5;display:flex;justify-content:space-between;align-items:center}
.kanban-card{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer}
.kanban-card:hover{border-color:#aaa}
.kanban-card .company{font-weight:500;font-size:13px;margin-bottom:2px}
.kanban-card .role{font-size:12px;color:#666}
.kanban-card .meta{font-size:11px;margin-top:6px}
.list-table{width:100%;border-collapse:collapse;font-size:13px}
.list-table th{text-align:left;padding:8px 10px;font-size:12px;font-weight:500;color:#666;border-bottom:1px solid #e5e5e5;white-space:nowrap}
.list-table td{padding:8px 10px;border-bottom:1px solid #e5e5e5;vertical-align:middle}
.list-table tr:hover td{background:#f9f9f9}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.contact-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1rem 1.25rem}
.contact-card.overdue-high{border-left:3px solid #e24b4a}
.contact-card.overdue-med{border-left:3px solid #ef9f27}
.avatar{width:40px;height:40px;border-radius:50%;background:#e6f1fb;color:#0c447c;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.85);z-index:1000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:2rem 1rem}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.5rem;width:min(500px,92vw);border:1px solid #ccc;position:relative;z-index:1001;margin:auto;flex-shrink:0}
.modal h3{margin-bottom:1rem;font-size:16px;font-weight:500}
.form-row{margin-bottom:.75rem}
.form-row label{display:block;font-size:12px;color:#666;margin-bottom:4px}
.form-row input,.form-row select,.form-row textarea{width:100%;font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a}
.form-row textarea{height:70px;resize:vertical}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.toolbar select{font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;font-family:inherit}
.followup-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 12px;border-radius:8px;margin-bottom:8px;border:1px solid #e5e5e5}
.legend{display:flex;gap:16px;font-size:12px;margin-bottom:1rem;flex-wrap:wrap;color:#666}
.legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px}
.search-input{padding:7px 12px;border:1px solid #ccc;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;width:200px}
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="showView('dashboard',this)">Dashboard</button>
  <button class="nav-btn" onclick="showView('kanban',this)">Kanban</button>
  <button class="nav-btn" onclick="showView('list',this)">All Jobs</button>
  <button class="nav-btn" onclick="showView('contacts',this)">Contacts</button>
  <button class="nav-btn" onclick="showView('followups',this)">Follow-ups</button>
</nav>

<div id="view-dashboard" class="view active">
  <div class="metrics" id="metrics"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1.5rem">
    <div>
      <p style="font-size:13px;color:#666;margin-bottom:.5rem">Application funnel</p>
      <div style="position:relative;height:220px"><canvas id="funnelChart" role="img" aria-label="Application funnel by stage"></canvas></div>
    </div>
    <div>
      <p style="font-size:13px;color:#666;margin-bottom:.5rem">Contacts by industry</p>
      <div style="position:relative;height:220px"><canvas id="catChart" role="img" aria-label="Contacts by industry"></canvas></div>
    </div>
  </div>
  <div id="dash-followups"></div>
</div>

<div id="view-kanban" class="view">
  <div class="toolbar"><button class="btn btn-primary" onclick="openJobModal()">+ Add job</button></div>
  <div class="kanban" id="kanban-board"></div>
</div>

<div id="view-list" class="view">
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openJobModal()">+ Add job</button>
    <select onchange="listFilterStage=this.value;renderList()" id="filter-stage"><option value="">All stages</option></select>
    <select onchange="listFilterCat=this.value;renderList()" id="filter-cat"><option value="">All industries</option></select>
  </div>
  <div style="overflow-x:auto"><table class="list-table">
    <thead><tr><th>Company</th><th>Role</th><th>Industry</th><th>Stage</th><th>Applied</th><th>Follow-up</th><th>Actions</th></tr></thead>
    <tbody id="list-body"></tbody>
  </table></div>
</div>

<div id="view-contacts" class="view">
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openContactModal()">+ Add contact</button>
    <input class="search-input" placeholder="Search contacts..." oninput="renderContacts(this.value)">
    <select onchange="contactFilterIndustry=this.value;renderContacts()" id="filter-industry"><option value="">All industries</option></select>
  </div>
  <div class="legend">
    <span><span class="legend-dot" style="background:#e24b4a"></span>Follow-up 3+ weeks overdue</span>
    <span><span class="legend-dot" style="background:#ef9f27"></span>Follow-up 2–3 weeks overdue</span>
  </div>
  <div class="contact-grid" id="contact-grid"></div>
</div>

<div id="view-followups" class="view">
  <div class="legend" style="margin-top:.5rem">
    <span><span class="legend-dot" style="background:#e24b4a"></span>3+ weeks overdue</span>
    <span><span class="legend-dot" style="background:#ef9f27"></span>2–3 weeks overdue</span>
    <span><span class="legend-dot" style="background:#e5e5e5"></span>No date / future</span>
  </div>
  <div id="followup-list" style="margin-top:1rem"></div>
</div>

<!-- JOB MODAL -->
<div class="modal-overlay" id="job-modal">
  <div class="modal">
    <h3 id="modal-title">Add job</h3>
    <div class="form-row"><label>Company *</label><input id="f-company" placeholder="e.g. Acme Corp"></div>
    <div class="form-row"><label>Role *</label><input id="f-role" placeholder="e.g. Product Manager"></div>
    <div class="form-row"><label>Industry</label><input id="f-category" placeholder="e.g. Banking, IT, Consulting"></div>
    <div class="form-row"><label>Stage</label>
      <select id="f-stage"><option value="wishlist">Wishlist</option><option value="applied">Applied</option><option value="phone">Phone screen</option><option value="interview">Interview</option><option value="offer">Offer</option><option value="rejected">Rejected</option></select>
    </div>
    <div class="form-row"><label>Date applied</label><input type="date" id="f-date"></div>
    <div class="form-row"><label>Follow-up date</label><input type="date" id="f-followup"></div>
    <div class="form-row"><label>Notes</label><textarea id="f-notes"></textarea></div>
    <div class="form-actions">
      <button class="btn" onclick="closeJobModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveJob()">Save</button>
    </div>
  </div>
</div>

<!-- CONTACT MODAL -->
<div class="modal-overlay" id="contact-modal">
  <div class="modal">
    <h3>Add contact</h3>
    <div class="form-row"><label>Name *</label><input id="c-name"></div>
    <div class="form-row"><label>Company</label><input id="c-company"></div>
    <div class="form-row"><label>Industry</label><input id="c-industry"></div>
    <div class="form-row"><label>Role / Title</label><input id="c-role"></div>
    <div class="form-row"><label>LinkedIn / Contact</label><input id="c-linkedin"></div>
    <div class="form-row"><label>Last contacted (date)</label><input type="date" id="c-lastcontact"></div>
    <div class="form-row"><label>Follow-up date</label><input type="date" id="c-followup"></div>
    <div class="form-row"><label>Notes</label><textarea id="c-notes"></textarea></div>
    <div class="form-actions">
      <button class="btn" onclick="closeContactModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveContact()">Save</button>
    </div>
  </div>
</div>

<script>
const STAGES=['wishlist','applied','phone','interview','offer','rejected'];
const STAGE_LABELS={wishlist:'Wishlist',applied:'Applied',phone:'Phone screen',interview:'Interview',offer:'Offer',rejected:'Rejected'};
const STAGE_BADGE={wishlist:'badge-wishlist',applied:'badge-applied',phone:'badge-phone',interview:'badge-interview',offer:'badge-offer',rejected:'badge-rejected'};
const FUNNEL_COLORS=['#7f77dd','#378add','#ef9f27','#1d9e75','#639922','#e24b4a'];
const TODAY=new Date(); TODAY.setHours(0,0,0,0);

const IMPORTED_CONTACTS=[
  {id:'i1',name:'Sarah Mitchell',company:'Royal Bank of Canada',industry:'Banking',role:'Senior Product Manager',linkedin:'https://www.linkedin.com/in/sample',lastContact:'2026-01-15',followup:'2026-01-28',notes:'Met at Ivey networking event. Open to referrals for PM roles.'},
  {id:'i2',name:'James Thornton / Priya Mehta',company:'TD Bank',industry:'Banking',role:'Director, Digital Strategy',linkedin:'https://www.linkedin.com/in/sample',lastContact:'2026-02-01',followup:'2026-02-20',notes:'James connected on LinkedIn. Priya suggested reaching out in Q2.'},
  {id:'i3',name:'Daniel Park',company:'Scotiabank',industry:'Banking',role:'Technical Program Manager',linkedin:'https://www.linkedin.com/in/sample',lastContact:'2026-01-10',followup:'',notes:'Spoke over phone. Vacancy expected in March.'},
  {id:'i4',name:'Aisha Fernandez',company:'Google',industry:'IT',role:'Product Lead, Workspace',linkedin:'https://www.linkedin.com/in/sample',lastContact:'2026-01-20',followup:'2026-02-05',notes:'Coffee chat scheduled. Agreed to refer for APM program.'},
  {id:'i5',name:'Kevin Liu',company:'Microsoft',industry:'IT',role:'Senior PM, Azure',linkedin:'https://www.linkedin.com/in/sample',lastContact:'2026-01-04',followup:'2026-01-18',notes:'CC done. Follow up with updated resume.'},
  {id:'i6',name:'Rachel Okonkwo',company:'Deloitte',industry:'Consulting',role:'Manager, Strategy & Ops',linkedin:'https://www.linkedin.com/in/sample',lastContact:'2026-01-22',followup:'2026-02-10',notes:'Met at career fair. Warm connection, very helpful.'},
  {id:'i7',name:'Tom Bakshi / Leila Nouri',company:'McKinsey & Company',industry:'Consulting',role:'Associate / Business Analyst',linkedin:'https://www.linkedin.com/in/sample',lastContact:'',followup:'2026-03-01',notes:'Tom reached out via alumni network. Leila may refer for BA role.'},
  {id:'i8',name:'Chris Andersen',company:'CIBC',industry:'Banking',role:'VP, Innovation Lab',linkedin:'https://www.linkedin.com/in/sample',lastContact:'2026-01-19',followup:'',notes:'Pinged for connection. Role currently open on their team.'},
  {id:'i9',name:'Nina Patel',company:'Shopify',industry:'IT',role:'Group Product Manager',linkedin:'https://www.linkedin.com/in/sample',lastContact:'2026-02-03',followup:'2026-02-25',notes:'Great conversation. Suggested applying for senior PM track in summer.'},
  {id:'i10',name:'Omar Hassan',company:'EY',industry:'Consulting',role:'Senior Consultant, Digital',linkedin:'https://www.linkedin.com/in/sample',lastContact:'',followup:'2026-01-31',notes:'Agreed to coffee chat — need to reschedule.'},
  {id:'i11',name:'Chloe Beaumont',company:'Bell Canada',industry:'Telecommunications',role:'Product Manager, 5G',linkedin:'https://www.linkedin.com/in/sample',lastContact:'',followup:'',notes:'Met at Western job fair. Stay in touch.'},
  {id:'i12',name:'Raj Sharma',company:'WSP Global',industry:'Engineering Services',role:'Program Director',linkedin:'https://www.linkedin.com/in/sample',lastContact:'',followup:'',notes:'Gave personal contact immediately. Very approachable.'},
  {id:'i13',name:'Lena Kozlov',company:'Loblaw Companies',industry:'CPG',role:'Senior Manager, Digital',linkedin:'https://www.linkedin.com/in/sample',lastContact:'2026-01-27',followup:'2026-02-15',notes:'Agreed to refer once a matching role opens.'},
  {id:'i14',name:'Marcus Webb',company:'Accenture',industry:'Consulting',role:'Technology Consulting Lead',linkedin:'https://www.linkedin.com/in/sample',lastContact:'',followup:'',notes:'Had a coffee chat 3 months back. Should reconnect.'},
  {id:'i15',name:'Fatima Al-Rashid',company:'Ontario Public Service',industry:'Public Sector',role:'Senior Policy Advisor',linkedin:'https://www.linkedin.com/in/sample',lastContact:'2026-01-23',followup:'2026-01-30',notes:'Got a reply via LinkedIn. Potential opening in Q2.'},
];

let jobs=[], contacts=[], editJobId=null, editContactId=null;
let listFilterStage='', listFilterCat='', contactFilterIndustry='';
let funnelChart=null, catChart=null;

function daysDiff(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((TODAY-d)/(1000*60*60*24));
}
function overdueClass(dateStr){
  const d=daysDiff(dateStr);
  if(d===null) return '';
  if(d>=21) return 'overdue-high';
  if(d>=14) return 'overdue-med';
  return '';
}
function overdueLabel(dateStr){
  const d=daysDiff(dateStr);
  if(d===null) return '';
  if(d<0) return `<span style="color:#1d9e75;font-size:11px">Due in ${Math.abs(d)}d</span>`;
  if(d===0) return `<span style="color:#1d9e75;font-size:11px">Due today</span>`;
  if(d>=21) return `<span style="color:#a32d2d;font-size:11px;font-weight:500">${d}d overdue</span>`;
  if(d>=14) return `<span style="color:#ba7517;font-size:11px;font-weight:500">${d}d overdue</span>`;
  return `<span style="color:#666;font-size:11px">${d}d ago</span>`;
}

function loadData(){
  try{ const r=localStorage.getItem('jt_jobs'); if(r) jobs=JSON.parse(r); }catch(e){jobs=[];}
  try{ const r=localStorage.getItem('jt_contacts'); if(r) contacts=JSON.parse(r); else contacts=[...IMPORTED_CONTACTS]; }catch(e){contacts=[...IMPORTED_CONTACTS];}
  populateIndustryFilter();
  renderAll();
}
function saveJobs(){ try{localStorage.setItem('jt_jobs',JSON.stringify(jobs));}catch(e){} }
function saveContacts(){ try{localStorage.setItem('jt_contacts',JSON.stringify(contacts));}catch(e){} }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

function populateIndustryFilter(){
  const industries=[...new Set(contacts.map(c=>c.industry).filter(Boolean))].sort();
  const sel=document.getElementById('filter-industry');
  while(sel.options.length>1) sel.remove(1);
  industries.forEach(i=>{ const o=document.createElement('option'); o.value=i; o.textContent=i; sel.appendChild(o); });
}

function showView(v,btn){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  btn.classList.add('active');
  if(v==='dashboard') renderDashboard();
  if(v==='kanban') renderKanban();
  if(v==='list') renderList();
  if(v==='contacts') renderContacts();
  if(v==='followups') renderFollowups();
}

function renderAll(){ renderDashboard(); renderKanban(); renderList(); renderContacts(); renderFollowups(); }

function renderDashboard(){
  const total=jobs.length, applied=jobs.filter(j=>j.stage!=='wishlist').length;
  const interviews=jobs.filter(j=>j.stage==='interview'||j.stage==='phone').length;
  const offers=jobs.filter(j=>j.stage==='offer').length;
  const overdueC=contacts.filter(c=>{ const d=daysDiff(c.followup); return d!==null&&d>=14; }).length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Jobs tracked</div><div class="metric-val">${total}</div></div>
    <div class="metric"><div class="metric-label">Applied</div><div class="metric-val">${applied}</div></div>
    <div class="metric"><div class="metric-label">Interviews</div><div class="metric-val">${interviews}</div></div>
    <div class="metric"><div class="metric-label">Offers</div><div class="metric-val">${offers}</div></div>
    <div class="metric"><div class="metric-label">Contacts</div><div class="metric-val">${contacts.length}</div></div>
    <div class="metric"><div class="metric-label">Overdue follow-ups</div><div class="metric-val" style="color:#a32d2d">${overdueC}</div></div>`;

  const counts=STAGES.map(s=>jobs.filter(j=>j.stage===s).length);
  if(funnelChart) funnelChart.destroy();
  funnelChart=new Chart(document.getElementById('funnelChart'),{
    type:'bar',data:{labels:STAGES.map(s=>STAGE_LABELS[s]),datasets:[{data:counts,backgroundColor:FUNNEL_COLORS,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
  });

  const ind={};
  contacts.forEach(c=>{ if(c.industry) ind[c.industry]=(ind[c.industry]||0)+1; });
  const iKeys=Object.keys(ind).sort((a,b)=>ind[b]-ind[a]);
  const iColors=['#378add','#7f77dd','#1d9e75','#ef9f27','#e24b4a','#d4537e','#888780','#5dcaa5','#f0997b'];
  if(catChart) catChart.destroy();
  if(iKeys.length){
    catChart=new Chart(document.getElementById('catChart'),{
      type:'doughnut',
      data:{labels:iKeys,datasets:[{data:iKeys.map(k=>ind[k]),backgroundColor:iColors.slice(0,iKeys.length),borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11}}}}}
    });
  }

  const overdue=contacts.filter(c=>{ const d=daysDiff(c.followup); return d!==null&&d>=14; })
    .sort((a,b)=>daysDiff(b.followup)-daysDiff(a.followup)).slice(0,6);
  const fu=document.getElementById('dash-followups');
  fu.innerHTML=overdue.length
    ? `<p style="font-size:13px;color:#666;margin-bottom:.75rem">Contacts needing follow-up (2+ weeks overdue)</p>`+
      overdue.map(c=>`<div class="followup-row ${overdueClass(c.followup)}">
        <div><span style="font-weight:500">${esc(c.name)}</span> <span style="color:#666;font-size:13px">@ ${esc(c.company)}</span></div>
        <div>${overdueLabel(c.followup)}</div>
      </div>`).join('')
    : `<p style="color:#666;font-size:13px">No overdue follow-ups right now.</p>`;
}

function renderKanban(){
  document.getElementById('kanban-board').innerHTML=STAGES.map(stage=>{
    const cols=jobs.filter(j=>j.stage===stage);
    return `<div class="kanban-col">
      <div class="kanban-col-header"><span>${STAGE_LABELS[stage]}</span><span style="font-size:11px">${cols.length}</span></div>
      ${cols.map(j=>`<div class="kanban-card" onclick="openJobModal('${j.id}')">
        <div class="company">${esc(j.company)}</div>
        <div class="role">${esc(j.role)}</div>
        <div class="meta"><span class="tag" style="font-size:10px">${esc(j.category||'')}</span></div>
      </div>`).join('')}
    </div>`;
  }).join('');
}

function renderList(){
  const cats=[...new Set(jobs.map(j=>j.category).filter(Boolean))];
  const fc=document.getElementById('filter-cat');
  while(fc.options.length>1) fc.remove(1);
  cats.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; fc.appendChild(o); });
  const fs=document.getElementById('filter-stage');
  if(fs.options.length<=1) STAGES.forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent=STAGE_LABELS[s]; fs.appendChild(o); });
  const filtered=jobs.filter(j=>(!listFilterStage||j.stage===listFilterStage)&&(!listFilterCat||j.category===listFilterCat));
  document.getElementById('list-body').innerHTML=filtered.length?filtered.map(j=>`
    <tr>
      <td style="font-weight:500">${esc(j.company)}</td>
      <td>${esc(j.role)}</td>
      <td><span class="tag">${esc(j.category||'—')}</span></td>
      <td><span class="badge ${STAGE_BADGE[j.stage]}">${STAGE_LABELS[j.stage]}</span></td>
      <td style="color:#666">${j.date||'—'}</td>
      <td>${j.followup?overdueLabel(j.followup):'—'}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-sm" onclick="openJobModal('${j.id}')">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteJob('${j.id}')">Del</button>
      </td>
    </tr>`).join('')
    :`<tr><td colspan="7" style="text-align:center;color:#666;padding:2rem">No jobs yet — add one!</td></tr>`;
}

function renderContacts(search=''){
  const q=(search||'').toLowerCase();
  const filtered=contacts.filter(c=>
    (!contactFilterIndustry||c.industry===contactFilterIndustry)&&
    (!q||(c.name+c.company+c.industry+c.notes).toLowerCase().includes(q))
  );
  const grid=document.getElementById('contact-grid');
  if(!filtered.length){ grid.innerHTML=`<p style="color:#666">No contacts found.</p>`; return; }
  grid.innerHTML=filtered.map(c=>{
    const initials=c.name.split(/[\s,/]+/).filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<div class="contact-card ${overdueClass(c.followup)}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="avatar">${initials}</div>
        <div>
          <div style="font-weight:500;font-size:13px">${esc(c.name)}</div>
          <div style="font-size:12px;color:#666">${esc(c.role||'')}${c.role&&c.company?' @ ':''}${esc(c.company||'')}</div>
          ${c.industry?`<span class="tag" style="font-size:10px;margin-top:3px">${esc(c.industry)}</span>`:''}
        </div>
      </div>
      ${c.linkedin&&c.linkedin.startsWith('http')?`<div style="font-size:11px;margin-bottom:4px"><a href="${esc(c.linkedin)}" target="_blank" style="color:#378add">LinkedIn</a></div>`:''}
      ${c.lastContact?`<div style="font-size:11px;color:#666">Last contact: ${c.lastContact}</div>`:''}
      ${c.followup?`<div style="font-size:11px;margin-top:2px">Follow-up: ${c.followup} ${overdueLabel(c.followup)}</div>`:''}
      ${c.notes?`<div style="font-size:12px;margin-top:8px;color:#666;border-top:1px solid #e5e5e5;padding-top:8px">${esc(c.notes)}</div>`:''}
      <div style="margin-top:10px;display:flex;gap:6px">
        <button class="btn btn-sm" onclick="openContactModal('${c.id}')">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteContact('${c.id}')">Del</button>
      </div>
    </div>`;
  }).join('');
}

function renderFollowups(){
  const withDate=contacts.filter(c=>c.followup).map(c=>({...c,diff:daysDiff(c.followup)})).sort((a,b)=>b.diff-a.diff);
  const noDate=contacts.filter(c=>!c.followup);
  let html='';
  if(withDate.length){
    html+=withDate.map(c=>{
      const cls=c.diff>=21?'overdue-high':c.diff>=14?'overdue-med':'';
      return `<div class="followup-row ${cls}">
        <div>
          <span style="font-weight:500">${esc(c.name)}</span>
          <span style="color:#666;font-size:13px"> @ ${esc(c.company)}</span>
          ${c.industry?`<span class="tag" style="font-size:10px;margin-left:6px">${esc(c.industry)}</span>`:''}
          ${c.notes?`<div style="font-size:12px;color:#666;margin-top:3px">${esc(c.notes.slice(0,80))}${c.notes.length>80?'…':''}</div>`:''}
        </div>
        <div style="text-align:right;white-space:nowrap;min-width:90px">
          <div>${overdueLabel(c.followup)}</div>
          <div style="font-size:11px;color:#666">${c.followup}</div>
        </div>
      </div>`;
    }).join('');
  }
  if(noDate.length){
    html+=`<p style="font-size:12px;color:#666;margin:1rem 0 .5rem">No follow-up date set (${noDate.length} contacts)</p>`;
    html+=noDate.map(c=>`<div class="followup-row">
      <div><span style="font-weight:500">${esc(c.name)}</span> <span style="color:#666;font-size:13px"> @ ${esc(c.company)}</span></div>
      <button class="btn btn-sm" onclick="openContactModal('${c.id}')">Set date</button>
    </div>`).join('');
  }
  document.getElementById('followup-list').innerHTML=html||'<p style="color:#666">No contacts yet.</p>';
}

function openJobModal(id=null){
  editJobId=id;
  const j=id?jobs.find(x=>x.id===id):null;
  document.getElementById('modal-title').textContent=id?'Edit job':'Add job';
  document.getElementById('f-company').value=j?.company||'';
  document.getElementById('f-role').value=j?.role||'';
  document.getElementById('f-category').value=j?.category||'';
  document.getElementById('f-stage').value=j?.stage||'wishlist';
  document.getElementById('f-date').value=j?.date||'';
  document.getElementById('f-followup').value=j?.followup||'';
  document.getElementById('f-notes').value=j?.notes||'';
  document.getElementById('job-modal').classList.add('open');
}
function closeJobModal(){ document.getElementById('job-modal').classList.remove('open'); editJobId=null; }
function saveJob(){
  const company=document.getElementById('f-company').value.trim();
  const role=document.getElementById('f-role').value.trim();
  if(!company||!role){ alert('Company and role are required.'); return; }
  const data={company,role,category:document.getElementById('f-category').value.trim(),stage:document.getElementById('f-stage').value,date:document.getElementById('f-date').value,followup:document.getElementById('f-followup').value,notes:document.getElementById('f-notes').value.trim()};
  if(editJobId){ const i=jobs.findIndex(j=>j.id===editJobId); jobs[i]={...jobs[i],...data}; }
  else jobs.push({id:uid(),...data});
  saveJobs(); closeJobModal(); renderAll();
}
function deleteJob(id){ if(!confirm('Delete this job?')) return; jobs=jobs.filter(j=>j.id!==id); saveJobs(); renderAll(); }

function openContactModal(id=null){
  editContactId=id;
  const c=id?contacts.find(x=>x.id===id):null;
  document.getElementById('c-name').value=c?.name||'';
  document.getElementById('c-company').value=c?.company||'';
  document.getElementById('c-industry').value=c?.industry||'';
  document.getElementById('c-role').value=c?.role||'';
  document.getElementById('c-linkedin').value=c?.linkedin||'';
  document.getElementById('c-lastcontact').value=c?.lastContact||'';
  document.getElementById('c-followup').value=c?.followup||'';
  document.getElementById('c-notes').value=c?.notes||'';
  document.getElementById('contact-modal').classList.add('open');
}
function closeContactModal(){ document.getElementById('contact-modal').classList.remove('open'); editContactId=null; }
function saveContact(){
  const name=document.getElementById('c-name').value.trim();
  if(!name){ alert('Name is required.'); return; }
  const data={name,company:document.getElementById('c-company').value.trim(),industry:document.getElementById('c-industry').value.trim(),role:document.getElementById('c-role').value.trim(),linkedin:document.getElementById('c-linkedin').value.trim(),lastContact:document.getElementById('c-lastcontact').value,followup:document.getElementById('c-followup').value,notes:document.getElementById('c-notes').value.trim()};
  if(editContactId){ const i=contacts.findIndex(c=>c.id===editContactId); contacts[i]={...contacts[i],...data}; }
  else contacts.push({id:uid(),...data});
  saveContacts(); populateIndustryFilter(); closeContactModal(); renderAll();
}
function deleteContact(id){ if(!confirm('Remove this contact?')) return; contacts=contacts.filter(c=>c.id!==id); saveContacts(); renderContacts(); }

document.getElementById('job-modal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeJobModal(); });
document.getElementById('contact-modal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeContactModal(); });

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadData();
</script>
</body>
</html>
